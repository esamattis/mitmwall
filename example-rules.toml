# mitmwall allow rules
# Installed to /opt/mitmwall/rules.d/examples.toml.
# Traffic is blocked unless the destination host and HTTP method match one of these rules.
#
# Each [[allow]] table must use exactly one of:
# - domain: a non-empty hostname string
# - domain_regex: a non-empty Python regular expression string
#
# include_subdomains is optional, valid only with domain, and defaults to false.
# methods is optional and defaults to ["GET", "HEAD"]. Set methods = "ANY"
# to allow all HTTP methods for a matching host.
# pathname_regex and pathname_pattern are optional pathname filters. Use at most
# one per rule. pathname_regex is a Python regular expression matched against
# the URL pathname. pathname_pattern supports URLPattern-style parameters such
# as "/esamattis/:repo.git/git-upload-pack".
# Unsupported keys are rejected. A rule cannot contain both domain and domain_regex.
# Hostnames are normalized before matching by trimming whitespace, removing a
# trailing dot, and lowercasing.

#
[[allow]]
domain = "github.com"
[[allow]]
domain = "ghcr.io"
[[allow]]
domain = "githubusercontent.com"
include_subdomains = true


# Allow `git fetch` for `esamattis`
[[allow]]
domain = "github.com"
methods = ["POST"]
pathname_pattern = "/esamattis/:repo.git/git-upload-pack"

# Allow `git push` for `esamattis`
[[allow]]
domain = "github.com"
methods = ["POST"]
pathname_pattern = "/esamattis/:repo.git/git-receive-pack"

# Pathname pattern-restricted rule: allows POST to a specific pie.dev test
# pathname shape. The :slug parameter matches exactly one pathname segment.
[[allow]]
domain = "pie.dev"
pathname_pattern = "/pathname-pattern/:slug/action"
methods = ["POST"]

# Pathname regex-restricted rule: allows POST to a specific pie.dev test
# pathname shape.
[[allow]]
domain = "pie.dev"
pathname_regex = '^/pathname-regex/[^/]+/info$'
methods = ["POST"]

[[allow]]
domain = "esamatti.fi"
include_subdomains = true

[[allow]]
domain = "downloads.mitmproxy.org"

[[allow]]
domain = "pie.dev"
methods = ["GET"]

# Python regex, compiled case-insensitively against the normalized hostname.
[[allow]]
domain_regex = '(^|\.)ipinfo\.io$'

## APT repositories
[[allow]]
domain = "ports.ubuntu.com"

[[allow]]
domain = "download.docker.com"

## Rust
[[allow]]
domain = "index.crates.io"

[[allow]]
domain = "registry.npmjs.org"

## PyPI
[[allow]]
domain = "pypi.org"
[[allow]]
domain = "files.pythonhosted.org"

## Opencode
[[allow]]
domain = "api.githubcopilot.com"
methods = "ANY"
[[allow]]
domain = "models.dev"
[[allow]]
domain = "cdn.agentclientprotocol.com"
pathname_pattern = "/registry/v1/latest/registry.json"

## Homebrew / Linuxbrew
[[allow]]
domain = "formulae.brew.sh"
